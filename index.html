<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Mục Đầu Tư Cổ Phiếu</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 900px; margin: auto; }
        .form-group { margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 5px; border: 1px solid #ddd; }
        input { padding: 8px; margin-right: 10px; width: 150px; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        .btn-delete { background: #dc3545; padding: 5px 10px; font-size: 12px; }
        .btn-delete:hover { background: #a71d2a; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f4f4f4; }
        .profit { color: green; font-weight: bold; }
        .loss { color: red; font-weight: bold; }
        .loading { color: gray; font-style: italic; }
    </style>
</head>
<body>

    <h2>Quản Lý Danh Mục Cổ Phiếu</h2>

    <div class="form-group">
        <label><b>Thêm / Cập nhật mã:</b></label><br><br>
        <input type="text" id="stockCode" placeholder="Nhập mã (VD: KBC)" style="text-transform: uppercase;">
        <input type="number" id="buyPrice" placeholder="Giá mua (VD: 25000)">
        <button onclick="addOrUpdateStock()">Lưu vào danh mục</button>
    </div>

    <button onclick="loadPrices()" style="background: #28a745;">Cập nhật giá thị trường</button>

    <table id="portfolio">
        <thead>
            <tr>
                <th>Mã HSX</th>
                <th>Giá Mua</th>
                <th>Giá Hiện Tại</th>
                <th>Biến động (Ngày)</th>
                <th>Lãi / Lỗ</th>
                <th>Hành Động</th>
            </tr>
        </thead>
        <tbody id="portfolioBody">
            </tbody>
    </table>

    <script>
        // BẮT BUỘC PHẢI DÙNG HTTPS KHI CHẠY TRÊN GITHUB PAGES
        const API_URL = "https://vikotech.vn/dashboard/api.php?code=";

        let myPortfolio = JSON.parse(localStorage.getItem('myStockPortfolio')) || [];

        function saveToCache() {
            localStorage.setItem('myStockPortfolio', JSON.stringify(myPortfolio));
        }

        function addOrUpdateStock() {
            let codeInput = document.getElementById("stockCode").value.trim().toUpperCase();
            let priceInput = parseFloat(document.getElementById("buyPrice").value);

            if (!codeInput || isNaN(priceInput)) {
                alert("Vui lòng nhập mã cổ phiếu và giá mua hợp lệ!");
                return;
            }

            let existingIndex = myPortfolio.findIndex(item => item.code === codeInput);
            if (existingIndex >= 0) {
                myPortfolio[existingIndex].buyPrice = priceInput;
            } else {
                myPortfolio.push({ code: codeInput, buyPrice: priceInput });
            }

            saveToCache();
            document.getElementById("stockCode").value = "";
            document.getElementById("buyPrice").value = "";
            renderTable();
            loadPrices();
        }

        function deleteStock(code) {
            myPortfolio = myPortfolio.filter(item => item.code !== code);
            saveToCache();
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById("portfolioBody");
            tbody.innerHTML = ""; 

            myPortfolio.forEach(item => {
                let tr = document.createElement("tr");
                tr.innerHTML = `
                    <td><strong>${item.code}</strong></td>
                    <td>${item.buyPrice.toLocaleString('vi-VN')}</td>
                    <td id="price-${item.code}" class="loading">Đang chờ...</td>
                    <td id="change-${item.code}">-</td>
                    <td id="diff-${item.code}">-</td>
                    <td><button class="btn-delete" onclick="deleteStock('${item.code}')">Xóa</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function loadPrices() {
            if (myPortfolio.length === 0) return;

            myPortfolio.forEach(item => {
                let priceCell = document.getElementById(`price-${item.code}`);
                if(priceCell) priceCell.innerText = "Đang tải...";
            });

            // Gộp tất cả các mã thành chuỗi "KBC,SSI,HPG" để gọi API 1 lần duy nhất
            let codeString = myPortfolio.map(item => item.code).join(',');

            try {
                const response = await fetch(API_URL + codeString);
                const result = await response.json();

                if (result.status === 'success' && result.data) {
                    // Duyệt qua mảng kết quả trả về từ PHP
                    result.data.forEach(stockData => {
                        let item = myPortfolio.find(p => p.code === stockData.code);
                        
                        if (item && stockData.status === 'success') {
                            let currentPrice = parseFloat(stockData.price.replace(/,/g, ''));
                            let diff = currentPrice - item.buyPrice;

                            // Cột Giá hiện tại
                            document.getElementById(`price-${stockData.code}`).innerText = currentPrice.toLocaleString('vi-VN');
                            document.getElementById(`price-${stockData.code}`).classList.remove('loading');
                            
                            // Cột Biến động trong ngày (Màu sắc tự động theo dấu âm/dương)
                            let changeCell = document.getElementById(`change-${stockData.code}`);
                            changeCell.innerText = stockData.change;
                            if(stockData.change.includes('-')) {
                                changeCell.className = "loss";
                            } else if (stockData.change !== "0") {
                                changeCell.className = "profit";
                            }

                            // Cột Chênh lệch Mua/Bán
                            let diffCell = document.getElementById(`diff-${stockData.code}`);
                            let prefix = diff > 0 ? "+" : "";
                            diffCell.innerText = prefix + diff.toLocaleString('vi-VN');
                            diffCell.className = diff >= 0 ? "profit" : "loss";
                        } else {
                            document.getElementById(`price-${stockData.code}`).innerText = "Lỗi / Không thấy";
                        }
                    });
                }
            } catch (error) {
                console.error("Lỗi fetch:", error);
                alert("Lỗi kết nối đến API. Hãy kiểm tra lại SSL (HTTPS) của niks.page.gd");
            }
        }

        window.onload = function() {
            renderTable();
            loadPrices();
        };
    </script>
</body>
</html>
